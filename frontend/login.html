<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestivoryx — Iniciar Sesión</title>
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome 6 para iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- Fuente Inter de Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Estilos personalizados del tema -->
  <link rel="stylesheet" href="assets/css/tailwind-theme.css" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    /* Patrón de cuadrícula sutil para el fondo oscuro */
    .grid-bg {
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
  </style>
</head>
<body class="min-h-screen bg-slate-900 grid-bg flex items-center justify-center p-4">

  <!-- Contenedor principal centrado -->
  <div class="w-full max-w-md">

    <!-- Tarjeta de inicio de sesión -->
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">

      <!-- Encabezado de la tarjeta con logo -->
      <div class="bg-slate-900 px-8 py-8 text-center">
        <div class="flex items-center justify-center gap-3 mb-2">
          <div class="w-10 h-10 bg-cyan-500 rounded-xl flex items-center justify-center">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
            </svg>
          </div>
          <span class="text-white font-bold text-2xl tracking-tight">Gestivoryx</span>
        </div>
        <p class="text-slate-400 text-sm mt-1">Sistema de Gestión de Inventarios</p>
      </div>

      <!-- Formulario de inicio de sesión -->
      <div class="px-8 py-8">
        <h2 class="text-xl font-semibold text-gray-900 mb-1">Bienvenido de nuevo</h2>
        <p class="text-sm text-gray-500 mb-6">Ingresa tus credenciales para continuar</p>

        <!-- Formulario — mantiene los IDs y lógica existente -->
        <form id="loginForm" class="space-y-5">
          <!-- Campo de usuario -->
          <div>
            <label for="username" class="block text-sm font-medium text-gray-700 mb-1.5">
              Usuario
            </label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
              </div>
              <input
                type="text"
                id="username"
                name="username"
                placeholder="Ingresa tu usuario"
                required
                class="w-full pl-10 pr-4 py-2.5 text-sm border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all"
              />
            </div>
          </div>

          <!-- Campo de contraseña -->
          <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">
              Contraseña
            </label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
              </div>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Ingresa tu contraseña"
                required
                class="w-full pl-10 pr-4 py-2.5 text-sm border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all"
              />
            </div>
          </div>

          <!-- Mensaje de error (oculto por defecto) -->
          <div id="loginError" class="hidden bg-red-50 border border-red-200 rounded-xl px-4 py-3 flex items-center gap-2">
            <svg class="w-4 h-4 text-red-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <p id="loginErrorMsg" class="text-sm text-red-700"></p>
          </div>

          <!-- Botón de inicio de sesión -->
          <button
            type="submit"
            id="loginBtn"
            class="w-full bg-cyan-500 hover:bg-cyan-600 text-white font-semibold py-2.5 px-4 rounded-xl transition-colors duration-200 flex items-center justify-center gap-2"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
            </svg>
            Iniciar Sesión
          </button>
        </form>
      </div>

      <!-- Pie de la tarjeta -->
      <div class="px-8 py-4 bg-gray-50 border-t border-gray-100 text-center">
        <p class="text-xs text-gray-400">© 2024 Gestivoryx · Todos los derechos reservados</p>
      </div>
    </div>
  </div>

  <!-- Script del cliente API (maneja autenticación) -->
  <script src="assets/js/api.js"></script>
  <script>
    // Redirigir si ya está autenticado
    if (getToken()) {
      window.location.href = 'admin.html';
    }

    // Manejar envío del formulario de inicio de sesión
    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const btn = document.getElementById('loginBtn');
      const errorDiv = document.getElementById('loginError');
      const errorMsg = document.getElementById('loginErrorMsg');

      // Estado de carga
      btn.disabled = true;
      btn.innerHTML = `<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg> Iniciando...`;

      errorDiv.classList.add('hidden');

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const data = await api.post('/auth/login', { username, password });

        if (data && data.access_token) {
          setToken(data.access_token);
          setUser(data.user || { username, nombre: username, rol: 'usuario' });
          window.location.href = 'admin.html';
        } else {
          throw new Error('Respuesta inesperada del servidor');
        }
      } catch (err) {
        errorDiv.classList.remove('hidden');
        errorMsg.textContent = err.message || 'Usuario o contraseña incorrectos';
        btn.disabled = false;
        btn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg> Iniciar Sesión`;
      }
    });
  </script>
</body>
</html>
