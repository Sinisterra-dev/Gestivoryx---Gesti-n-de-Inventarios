<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestivoryx – Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {} },
    };
  </script>
</head>
<body class="h-full bg-zinc-950 text-zinc-100 font-sans">
  <!-- Sidebar -->
  <aside class="fixed inset-y-0 left-0 w-64 bg-zinc-900 border-r border-zinc-800">
    <nav class="px-4 py-4 space-y-1">
      <a href="index.html" class="flex items-center gap-3 px-3 py-2 rounded-xl text-zinc-100 hover:bg-zinc-800">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M13 5v6h6"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="inventario.html" class="flex items-center gap-3 px-3 py-2 rounded-xl text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5h6M9 9h6M9 13h6M9 17h6"/></svg>
        <span>Inventario</span>
      </a>
      <a href="producto.html" class="flex items-center gap-3 px-3 py-2 rounded-xl text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        <span>Producto</span>
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <div id="main-content" class="ml-64 flex flex-col min-h-screen bg-zinc-950">
    <header class="flex items-center justify-between px-8 py-4 border-b border-zinc-800">
      <h1 class="text-2xl font-bold text-zinc-100">Panel de Control</h1>
      <div class="flex items-center space-x-4">
        <button class="p-2 rounded-xl text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
        </button>
        <button class="p-2 rounded-xl text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 15c2.21 0 4.304.537 6.121 1.804M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </button>
      </div>
    </header>
    <main class="flex-1 py-6 px-8">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-zinc-900 rounded-xl p-6 border border-zinc-800 shadow-lg">
          <h2 class="text-xl font-semibold text-zinc-100 mb-2">Total de productos</h2>
          <p class="text-3xl font-bold text-zinc-300">1,240</p>
        </div>
        <div class="bg-zinc-900 rounded-xl p-6 border border-zinc-800 shadow-lg">
          <h2 class="text-xl font-semibold text-zinc-100 mb-2">Categorías</h2>
          <p class="text-3xl font-bold text-zinc-300">18</p>
        </div>
        <div class="bg-zinc-900 rounded-xl p-6 border border-zinc-800 shadow-lg">
          <h2 class="text-xl font-semibold text-zinc-100 mb-2">Valor total</h2>
          <p class="text-3xl font-bold text-zinc-300">$ 312,560</p>
        </div>
      </div>
    </main>
    <footer class="px-8 py-4 border-t border-zinc-800 text-center text-zinc-500">
      © 2026 Gestivoryx. Todos los derechos reservados.
    </footer>
  </div>
</body>
</html>
